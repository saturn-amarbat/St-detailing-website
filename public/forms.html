<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>ST Chicagoland Mobile Detailing Forms</title>
  </head>
  <body>
    <form name="booking-wizard" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="booking-wizard" />
      <input type="hidden" name="bot-field" />
      <input type="hidden" name="subject" data-remove-prefix value="New ST Chicagoland quote request" />
      <input type="hidden" name="vehicleSize" />
      <input type="hidden" name="selectedPackage" />
      <input type="hidden" name="addons" />
      <input type="hidden" name="calculatedTotal" />
      <input type="hidden" name="firstName" />
      <input type="hidden" name="lastName" />
      <input type="hidden" name="email" />
      <input type="hidden" name="phone" />
      <input type="hidden" name="preferredDate" />
      <input type="hidden" name="preferredTime" />
      <input type="hidden" name="payload" />
    </form>
  </body>
</html>
